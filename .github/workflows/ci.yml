name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Contract tests (Go)
        run: go test ./internal/api -run Contract -count=1

      - name: Build server
        run: go build -o /dev/null ./cmd/server

      - name: Build preview-worker
        run: go build -o /dev/null ./cmd/preview-worker
