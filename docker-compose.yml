services:
  postgres:
    image: ccr.ccs.tencentyun.com/solat/postgres:16-pgcron-pgnet
    environment:
      POSTGRES_USER: storage
      POSTGRES_PASSWORD: storage
      POSTGRES_DB: storage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_storage_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage -d storage"]
      interval: 3s
      timeout: 5s
      retries: 10

  rustfs:
    image: ccr.ccs.tencentyun.com/solat/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    command: ["/data"]

  # 开源图片变换 https://github.com/imgproxy/imgproxy
  imgproxy:
    image: ccr.ccs.tencentyun.com/solat/imgproxy:latest
    ports:
      - "8081:8080"
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://rustfs:9000
      IMGPROXY_S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      IMGPROXY_ALLOWED_SOURCES: s3://
      IMGPROXY_MAX_SRC_RESOLUTION: 50
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    depends_on:
      - rustfs

  # 开源文档转换 https://github.com/gotenberg/gotenberg (MIT)
  gotenberg:
    image: ccr.ccs.tencentyun.com/solat/gotenberg:8
    ports:
      - "3000:3000"
    command:
      - gotenberg
      - --api-port=3000

  # Poppler 栅格化 sidecar（Poppler GPL + 薄 HTTP 封装）
  preview-worker:
    build:
      context: .
      dockerfile: docker/preview-worker/Dockerfile
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8090/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://storage:storage@postgres:5432/storage?sslmode=disable
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
      S3_BUCKET: uploads
      S3_USE_PATH_STYLE: "true"
      FFMPEG_PATH: /usr/bin/ffmpeg
      UPLOAD_SIGNING_SECRET: dev-upload-secret-change-me
      TRANSFORM_BACKEND: imgproxy
      IMGPROXY_BASE_URL: http://imgproxy:8080
      IMGPROXY_INSECURE: "true"
      GOTENBERG_URL: http://gotenberg:3000
      POPPLER_WORKER_URL: http://preview-worker:8090
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
      imgproxy:
        condition: service_started
      gotenberg:
        condition: service_started
      preview-worker:
        condition: service_healthy

  init-bucket:
    image: ccr.ccs.tencentyun.com/solat/alpine:3.20
    depends_on:
      - rustfs
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache aws-cli
        until aws --endpoint-url http://rustfs:9000 s3 ls 2>/dev/null; do sleep 2; done
        aws --endpoint-url http://rustfs:9000 s3 mb s3://uploads 2>/dev/null || true
        echo "bucket uploads ready"

  seed:
    image: ccr.ccs.tencentyun.com/solat/alpine:3.20
    depends_on:
      - api
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        sleep 3
        curl -sf -X POST http://api:8080/storage/v1/buckets \
          -H 'Content-Type: application/json' \
          -d '{"id":"uploads","name":"uploads","public":true}' || true

volumes:
  pgdata:
  rustfs-data:
